<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#333333" />
      <stop offset="100%" stop-color="#151515" />
    </radialGradient>
    
    <!-- Heart Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="2" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Inner Glow for the heart -->
    <radialGradient id="heartGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8c00" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#ff8c00" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Dark Background -->
  <rect width="100" height="100" fill="#1a1a1a" />
  
  <!-- Dark Background Circle -->
  <circle cx="50" cy="50" r="45" fill="url(#bgGrad)" />
  
  <!-- Outer Glow behind heart -->
  <circle cx="50" cy="50" r="28" fill="url(#heartGlow)" />

  <!-- Glowing Neon Heart Outline -->
  <path d="M 50,78 C 50,78 24,54 24,35 C 24,20 42,20 50,33 C 58,20 76,20 76,35 C 76,54 50,78 50,78 Z" 
        fill="none" 
        stroke="#FFF0D4" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
</svg>